name: Build Pinterest Saver (Windows EXE)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gallery-dl pyinstaller

      - name: Build EXE
        run: |
          cd pinterest_saver
          pyinstaller --onefile --windowed --name PinterestSaver --icon=icon.ico main.py
        continue-on-error: true

      - name: Build EXE (no icon fallback)
        run: |
          cd pinterest_saver
          pyinstaller --onefile --windowed --name PinterestSaver main.py
        if: failure()

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PinterestSaver-Windows
          path: pinterest_saver/dist/PinterestSaver.exe
