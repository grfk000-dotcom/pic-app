name: Build Pinterest Saver (Windows EXE)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gallery-dl pyinstaller

      - name: Copy gallery-dl executable
        run: |
          $gdl = (Get-Command gallery-dl).Source
          Copy-Item $gdl gallery-dl.exe

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name PinterestSaver --add-binary "gallery-dl.exe;." main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PinterestSaver-Windows
          path: dist/PinterestSaver.exe
